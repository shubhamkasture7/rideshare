version: '3.8'

services:
  # ─── PostgreSQL Database ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ridesharing-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ridesharing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ridesharing-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS Backend (optional — can run locally) ──────
  # Uncomment below to run backend in Docker
  # backend:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: ridesharing-backend
  #   restart: unless-stopped
  #   ports:
  #     - '5000:5000'
  #   environment:
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ridesharing
  #     REDIS_URL: redis://redis:6379
  #     JWT_SECRET: ridesharing-super-secret-key-change-in-production-2024
  #     JWT_EXPIRY: 7d
  #     PORT: 5000
  #     CORS_ORIGIN: '*'
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:
